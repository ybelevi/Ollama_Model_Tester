<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Listesi - Ollama Model Tester</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🧪 Ollama Model Tester</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Test</a></li>
          <li class="nav-item"><a class="nav-link active" href="tests.html">Testler</a></li>
          <li class="nav-item"><a class="nav-link" href="ranking.html">Sıralama</a></li>
          <li class="nav-item"><a class="nav-link" href="compare.html">Karşılaştır</a></li>
          <li class="nav-item"><a class="nav-link" href="marathon.html">Maraton</a></li>
          <li class="nav-item"><a class="nav-link" href="system.html">Sistem</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4 fade-in">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>📋 Tüm Testler</h2>
      <span class="badge bg-dark fs-6" id="totalBadge">0 test</span>
    </div>

    <div class="accordion" id="testsAccordion">
      <!-- Categories injected by JS -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const categories = [
      { id: 'coding', name: 'Coding', icon: '🔧', desc: 'Kod üretimi, debug, güvenlik, mimari, algoritma.', color: 'primary' },
      { id: 'vision', name: 'Vision', icon: '👁️', desc: 'Görüntü analizi, UI element tanıma, diagram okuma, OCR.', color: 'info' },
      { id: 'tools', name: 'Tools', icon: '🛠️', desc: 'Fonksiyon çağrısı, tool selection, multi-step chaining.', color: 'success' },
      { id: 'thinking', name: 'Thinking', icon: '🧠', desc: 'Çok adımlı muhakeme, mantık, olasılık, threat model.', color: 'warning' },
      { id: 'embedding', name: 'Embedding', icon: '📊', desc: 'Semantic search, similarity, RAG context, cross-lingual.', color: 'danger' }
    ];

    async function loadTests() {
      const container = document.getElementById('testsAccordion');
      let totalTests = 0;

      for (const cat of categories) {
        try {
          const resp = await fetch(`/api/prompts/${cat.id}`);
          if (!resp.ok) continue;
          const data = await resp.json();
          const tests = data.prompts || [];
          totalTests += tests.length;

          const item = document.createElement('div');
          item.className = 'accordion-item';
          item.innerHTML = `
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse_${cat.id}">
                <span class="fs-4 me-2">${cat.icon}</span>
                <strong>${cat.name}</strong>
                <span class="badge bg-${cat.color} ms-2">${tests.length} test</span>
                <span class="text-muted small ms-2 d-none d-md-inline">— ${cat.desc}</span>
              </button>
            </h2>
            <div id="collapse_${cat.id}" class="accordion-collapse collapse" data-bs-parent="#testsAccordion">
              <div class="accordion-body p-0">
                <div class="list-group list-group-flush">
                  ${tests.map((t, i) => `
                    <div class="list-group-item">
                      <div class="d-flex w-100 justify-content-between">
                        <h6 class="mb-1"><code>${t.id}</code></h6>
                        <small class="text-muted">#${i + 1}</small>
                      </div>
                      <pre class="prompt-box mb-2"><code>${escapeHtml(t.prompt)}</code></pre>
                      <div class="mt-2">
                        <small class="text-muted fw-bold">Neleri Test Eder:</small>
                        <div class="d-flex flex-wrap gap-1 mt-1">
                          ${(t.expected_focus || []).map(f => `<span class="badge bg-light text-dark border">${escapeHtml(f)}</span>`).join('')}
                        </div>
                      </div>
                      ${t.depends_on ? `<div class="mt-1"><small class="text-warning">🔗 Bağımlı: <code>${t.depends_on}</code></small></div>` : ''}
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          `;
          container.appendChild(item);
        } catch (e) {
          console.error(`Failed to load ${cat.id}:`, e);
        }
      }

      document.getElementById('totalBadge').textContent = `${totalTests} test`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadTests();
  </script>
</body>
</html>
