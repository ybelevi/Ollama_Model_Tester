<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Sonuçları - Ollama Model Tester</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🧪 Ollama Model Tester</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Test</a></li>
          <li class="nav-item"><a class="nav-link" href="tests.html">Testler</a></li>
          <li class="nav-item"><a class="nav-link" href="ranking.html">Sıralama</a></li>
          <li class="nav-item"><a class="nav-link" href="compare.html">Karşılaştır</a></li>
          <li class="nav-item"><a class="nav-link" href="marathon.html">Maraton</a></li>
          <li class="nav-item"><a class="nav-link" href="system.html">Sistem</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4 fade-in">
    <div id="loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3">Sonuçlar yükleniyor...</p>
    </div>

    <div id="content" class="d-none">
      <!-- Model Header -->
      <div class="ai-commentary">
        <h5>🤖 AI Değerlendirmesi</h5>
        <p id="aiSummary">Model değerlendirmesi yükleniyor...</p>
      </div>

      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h4 class="mb-0" id="modelTitle">Model Sonuçları</h4>
          <div>
            <button class="btn btn-sm btn-outline-light" id="btnExport">💾 Export</button>
            <a href="compare.html" class="btn btn-sm btn-light">⚖️ Karşılaştır</a>
          </div>
        </div>
        <div class="card-body">
          <div class="row text-center" id="statsRow">
            <!-- Stats injected -->
          </div>
        </div>
      </div>

      <!-- Category Charts -->
      <div class="row mb-4" id="categoryCharts">
        <!-- Category bars injected -->
      </div>

      <!-- Detailed Results -->
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">📋 Detaylı Sonuçlar</h5>
        </div>
        <div class="card-body p-0">
          <div class="accordion" id="resultsAccordion">
            <!-- Accordion items injected -->
          </div>
        </div>
      </div>
    </div>

    <div id="error" class="alert alert-danger d-none mt-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_BASE = window.location.origin + '/api';
    const urlParams = new URLSearchParams(window.location.search);
    let resultId = urlParams.get('id');

    // If no id, use latest result
    async function loadLatest() {
      try {
        const resp = await fetch(`${API_BASE}/results`);
        const data = await resp.json();
        if (data.results.length > 0) {
          resultId = data.results[0].id;
          loadResult();
        } else {
          document.getElementById('loading').classList.add('d-none');
          document.getElementById('error').classList.remove('d-none');
          document.getElementById('error').textContent = 'Henüz bir test sonucu yok.';
        }
      } catch (e) {
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('error').classList.remove('d-none');
        document.getElementById('error').textContent = 'Hata: ' + e.message;
      }
    }

    async function loadResult() {
      try {
        const resp = await fetch(`${API_BASE}/results/${resultId}`);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        renderResult(data);
      } catch (e) {
        document.getElementById('loading').classList.add('d-none');
        document.getElementById('error').classList.remove('d-none');
        document.getElementById('error').textContent = 'Hata: ' + e.message;
      }
    }

    function renderResult(data) {
      const { manifest, categories } = data;
      document.getElementById('loading').classList.add('d-none');
      document.getElementById('content').classList.remove('d-none');

      document.getElementById('modelTitle').textContent = `${manifest.model} Sonuçları`;

      // Stats
      const total = manifest.total_prompts;
      let completed = 0;
      Object.values(categories).forEach(arr => completed += arr.length);
      const duration = manifest.duration_sec ? `${(manifest.duration_sec / 60).toFixed(1)} dk` : 'Devam ediyor';

      document.getElementById('statsRow').innerHTML = `
        <div class="col-3"><div class="display-6">${total}</div><div class="text-muted">Toplam Test</div></div>
        <div class="col-3"><div class="display-6 text-success">${completed}</div><div class="text-muted">Tamamlanan</div></div>
        <div class="col-3"><div class="display-6">${Object.keys(categories).length}</div><div class="text-muted">Kategori</div></div>
        <div class="col-3"><div class="display-6">${duration}</div><div class="text-muted">Süre</div></div>
      `;

      // AI Commentary (simulated for now, could be enhanced)
      const catNames = Object.keys(categories);
      const aiText = `
        <strong>${manifest.model}</strong> modeli ${catNames.length} kategoride test edildi.
        Toplam ${total} prompttan ${completed} tanesi tamamlandı.
        ${catNames.includes('hallucination') ? 'Halüsinasyon testleri değerlendirildi.' : ''}
        Detaylı analiz için aşağıdaki sonuçları inceleyin.
      `;
      document.getElementById('aiSummary').innerHTML = aiText;

      // Category bars
      const chartsDiv = document.getElementById('categoryCharts');
      chartsDiv.innerHTML = '';
      Object.entries(categories).forEach(([catName, items]) => {
        const card = document.createElement('div');
        card.className = 'col-md-6 col-lg-4 mb-3';
        card.innerHTML = `
          <div class="card h-100">
            <div class="card-body">
              <h6 class="text-uppercase text-muted small">${catName}</h6>
              <div class="display-6">${items.length}</div>
              <div class="progress mt-2" style="height: 8px;">
                <div class="progress-bar" style="width: 100%"></div>
              </div>
            </div>
          </div>
        `;
        chartsDiv.appendChild(card);
      });

      // Accordion
      const acc = document.getElementById('resultsAccordion');
      acc.innerHTML = '';
      let globalIdx = 0;
      Object.entries(categories).forEach(([catName, items]) => {
        items.forEach(item => {
          globalIdx++;
          const el = document.createElement('div');
          el.className = 'accordion-item';
          el.innerHTML = `
            <h2 class="accordion-header">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${globalIdx}">
                <span class="badge bg-primary me-2">${catName}</span>
                <span class="text-truncate">${item.id}</span>
                <span class="ms-auto badge bg-secondary">${item.duration_sec}s</span>
              </button>
            </h2>
            <div id="collapse${globalIdx}" class="accordion-collapse collapse" data-bs-parent="#resultsAccordion">
              <div class="accordion-body">
                <h6>Prompt:</h6>
                <pre class="bg-light p-2 rounded"><code>${escapeHtml(item.prompt)}</code></pre>
                <h6>Response:</h6>
                <pre class="bg-light p-2 rounded"><code>${escapeHtml(item.response)}</code></pre>
              </div>
            </div>
          `;
          acc.appendChild(el);
        });
      });

      // Export button
      document.getElementById('btnExport').onclick = () => {
        window.open(`${API_BASE}/export/${resultId}`, '_blank');
      };
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    if (resultId) {
      loadResult();
    } else {
      loadLatest();
    }
  </script>
</body>
</html>
